<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dijital Kartvizit</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script src="src/data/card.js"></script>

<style>
  :root {
    --accent: #5b3df5;
    --accent-light: #f0edfe;
    --text-main: #1f2430;
    --text-muted: #6b7280;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f4f5f7;
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(15, 15, 25, 0.08);
    padding: 40px 32px;
    text-align: center;
  }

  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: var(--accent-light);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 600;
    margin: 0 auto 20px;
  }

  .name {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-main);
    margin: 0 0 4px;
  }

  .title {
    font-size: 15px;
    color: var(--accent);
    font-weight: 600;
    margin: 0 0 2px;
  }

  .company {
    font-size: 14px;
    color: var(--text-muted);
    margin: 0 0 24px;
  }

  .divider {
    height: 1px;
    background: #eef0f3;
    margin: 0 0 24px;
  }

  .info-list {
    list-style: none;
    padding: 0;
    margin: 0 0 28px;
    text-align: left;
  }

  .info-list li {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    color: var(--text-main);
    padding: 8px 0;
  }

  .info-list .icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    color: var(--accent);
  }

  .info-list a {
    color: inherit;
    text-decoration: none;
  }

  .info-list a:hover {
    text-decoration: underline;
  }

  .socials {
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .socials a {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--accent-light);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .socials a:hover {
    background: var(--accent);
    color: #ffffff;
  }

  .socials svg {
    width: 18px;
    height: 18px;
  }

  .qr-block {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid #eef0f3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .qr-block canvas {
    border-radius: 12px;
  }

  .qr-caption {
    font-size: 12px;
    color: var(--text-muted);
    margin: 0;
  }

  .save-form {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid #eef0f3;
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: left;
  }

  .save-form .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .save-form label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .save-form input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #e3e5ea;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text-main);
  }

  .save-form input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .save-form button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #ffffff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }

  .save-form button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .save-status {
    font-size: 12px;
    margin: 0;
    text-align: center;
  }

  .save-status.success {
    color: #1d9a6c;
  }

  .save-status.error {
    color: #d64545;
  }
</style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useRef, useEffect, useState } = React;

    const LIVE_URL = "https://ahmetcansakiz.github.io/bizcard-miuul/";
    const SAVE_CARD_WEBHOOK_URL = "https://n8n.rmhy.net/webhook/biz-card";

    const SOCIAL_ICONS = {
      linkedin: (
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6.94 5a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM3.5 8.75h3v11.75h-3zM9.5 8.75h2.87v1.6h.04c.4-.76 1.38-1.6 2.84-1.6 3.04 0 3.6 2 3.6 4.6v6.9h-3v-6.12c0-1.46-.03-3.34-2.04-3.34-2.04 0-2.35 1.6-2.35 3.24v6.22h-3z" />
        </svg>
      ),
      instagram: (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <rect x="3" y="3" width="18" height="18" rx="5" />
          <circle cx="12" cy="12" r="4" />
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none" />
        </svg>
      ),
    };

    const ICONS = {
      phone: (
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
      ),
      email: (
        <>
          <path d="M22 6l-10 7L2 6" />
          <rect x="2" y="4" width="20" height="16" rx="2" />
        </>
      ),
      website: (
        <>
          <circle cx="12" cy="12" r="10" />
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
        </>
      ),
    };

    function Avatar({ initials }) {
      return <div className="avatar">{initials}</div>;
    }

    function ContactList({ contacts }) {
      return (
        <ul className="info-list">
          {contacts.map((contact) => (
            <li key={contact.label}>
              <svg
                className="icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="2"
                strokeLinecap="round"
                strokeLinejoin="round"
              >
                {ICONS[contact.icon]}
              </svg>
              <a href={contact.href} target={contact.external ? "_blank" : undefined} rel={contact.external ? "noopener" : undefined}>
                {contact.label}
              </a>
            </li>
          ))}
        </ul>
      );
    }

    function SaveCardForm() {
      const [name, setName] = useState("");
      const [email, setEmail] = useState("");
      const [status, setStatus] = useState("idle");

      async function handleSubmit(event) {
        event.preventDefault();
        setStatus("sending");

        try {
          const response = await fetch(SAVE_CARD_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: "save_card",
              timestamp: new Date().toISOString(),
              source: "bizcard-web",
              visitor: { name, email },
            }),
          });

          if (!response.ok) throw new Error("Request failed");
          setStatus("success");
          setName("");
          setEmail("");
        } catch (error) {
          setStatus("error");
        }
      }

      return (
        <form className="save-form" onSubmit={handleSubmit}>
          <div className="field">
            <label htmlFor="visitor-name">İsim</label>
            <input
              id="visitor-name"
              type="text"
              value={name}
              onChange={(event) => setName(event.target.value)}
              required
            />
          </div>

          <div className="field">
            <label htmlFor="visitor-email">E-posta</label>
            <input
              id="visitor-email"
              type="email"
              value={email}
              onChange={(event) => setEmail(event.target.value)}
              required
            />
          </div>

          <button type="submit" disabled={status === "sending"}>
            {status === "sending" ? "Gönderiliyor..." : "Kartı Kaydet"}
          </button>

          {status === "success" && (
            <p className="save-status success">Teşekkürler, bilgileriniz kaydedildi!</p>
          )}
          {status === "error" && (
            <p className="save-status error">Bir şeyler ters gitti, lütfen tekrar deneyin.</p>
          )}
        </form>
      );
    }

    function QRCodeBlock({ url }) {
      const canvasRef = useRef(null);

      useEffect(() => {
        new QRious({
          element: canvasRef.current,
          value: url,
          size: 120,
          foreground: "#1f2430",
          background: "#ffffff",
        });
      }, [url]);

      return (
        <div className="qr-block">
          <canvas ref={canvasRef}></canvas>
          <p className="qr-caption">Kartviziti canlı görüntülemek için okutun</p>
        </div>
      );
    }

    function ProfileCard({ profile }) {
      const initials = useMemo(
        () =>
          profile.name
            .split(" ")
            .map((part) => part[0])
            .join("")
            .toUpperCase(),
        [profile.name]
      );

      return (
        <div className="card">
          <Avatar initials={initials} />

          <p className="name">{profile.name}</p>
          <p className="title">{profile.title}</p>
          {profile.company && <p className="company">{profile.company}</p>}

          <div className="divider"></div>

          <ContactList contacts={profile.contacts} />

          <div className="socials">
            {profile.socials.map((social) => (
              <a key={social.label} href={social.href} aria-label={social.label}>
                {SOCIAL_ICONS[social.icon]}
              </a>
            ))}
          </div>

          <SaveCardForm />

          <QRCodeBlock url={LIVE_URL} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <ProfileCard profile={CARD_DATA} />
    );
  </script>

</body>
</html>
