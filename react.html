<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dijital Kartvizit</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  :root {
    --accent: #5b3df5;
    --accent-light: #f0edfe;
    --text-main: #1f2430;
    --text-muted: #6b7280;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f4f5f7;
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(15, 15, 25, 0.08);
    padding: 40px 32px;
    text-align: center;
  }

  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: var(--accent-light);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 600;
    margin: 0 auto 20px;
  }

  .name {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-main);
    margin: 0 0 4px;
  }

  .title {
    font-size: 15px;
    color: var(--accent);
    font-weight: 600;
    margin: 0 0 2px;
  }

  .company {
    font-size: 14px;
    color: var(--text-muted);
    margin: 0 0 24px;
  }

  .divider {
    height: 1px;
    background: #eef0f3;
    margin: 0 0 24px;
  }

  .info-list {
    list-style: none;
    padding: 0;
    margin: 0 0 28px;
    text-align: left;
  }

  .info-list li {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    color: var(--text-main);
    padding: 8px 0;
  }

  .info-list .icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    color: var(--accent);
  }

  .info-list a {
    color: inherit;
    text-decoration: none;
  }

  .info-list a:hover {
    text-decoration: underline;
  }

  .socials {
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .socials a {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--accent-light);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .socials a:hover {
    background: var(--accent);
    color: #ffffff;
  }

  .socials svg {
    width: 18px;
    height: 18px;
  }
</style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useMemo } = React;

    const ICONS = {
      phone: (
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
      ),
      email: (
        <>
          <path d="M22 6l-10 7L2 6" />
          <rect x="2" y="4" width="20" height="16" rx="2" />
        </>
      ),
      website: (
        <>
          <circle cx="12" cy="12" r="10" />
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
        </>
      ),
    };

    function Avatar({ initials }) {
      return <div className="avatar">{initials}</div>;
    }

    function ContactList({ contacts }) {
      return (
        <ul className="info-list">
          {contacts.map((contact) => (
            <li key={contact.label}>
              <svg
                className="icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="2"
                strokeLinecap="round"
                strokeLinejoin="round"
              >
                {ICONS[contact.icon]}
              </svg>
              <a href={contact.href} target={contact.external ? "_blank" : undefined} rel={contact.external ? "noopener" : undefined}>
                {contact.label}
              </a>
            </li>
          ))}
        </ul>
      );
    }

    function ProfileCard({ profile }) {
      const initials = useMemo(
        () =>
          profile.name
            .split(" ")
            .map((part) => part[0])
            .join("")
            .toUpperCase(),
        [profile.name]
      );

      return (
        <div className="card">
          <Avatar initials={initials} />

          <p className="name">{profile.name}</p>
          <p className="title">{profile.title}</p>
          {profile.company && <p className="company">{profile.company}</p>}

          <div className="divider"></div>

          <ContactList contacts={profile.contacts} />

          <div className="socials">
            {profile.socials.map((social) => (
              <a key={social.label} href={social.href} aria-label={social.label}>
                {social.icon}
              </a>
            ))}
          </div>
        </div>
      );
    }

    const profile = {
      name: "Ahmet Can Sakız",
      title: "Eğitmen & Miuul",
      company: "",
      contacts: [
        { icon: "phone", label: "+90 555 123 45 67", href: "tel:+905551234567" },
        { icon: "email", label: "ahmetcansakiz@gmail.com", href: "mailto:ahmetcansakiz@gmail.com" },
        { icon: "website", label: "www.ibadanismanlik.com", href: "https://www.ibadanismanlik.com", external: true },
      ],
      socials: [
        {
          label: "LinkedIn",
          href: "#",
          icon: (
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M6.94 5a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM3.5 8.75h3v11.75h-3zM9.5 8.75h2.87v1.6h.04c.4-.76 1.38-1.6 2.84-1.6 3.04 0 3.6 2 3.6 4.6v6.9h-3v-6.12c0-1.46-.03-3.34-2.04-3.34-2.04 0-2.35 1.6-2.35 3.24v6.22h-3z" />
            </svg>
          ),
        },
        {
          label: "Instagram",
          href: "#",
          icon: (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <rect x="3" y="3" width="18" height="18" rx="5" />
              <circle cx="12" cy="12" r="4" />
              <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none" />
            </svg>
          ),
        },
      ],
    };

    ReactDOM.createRoot(document.getElementById("root")).render(
      <ProfileCard profile={profile} />
    );
  </script>

</body>
</html>
